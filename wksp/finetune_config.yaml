model:
  name: "Qwen/Qwen1.5-1.8B"
  use_flash_attention: true
  use_4bit: true
  use_nested_quant: false
  bnb_4bit_compute_dtype: "float16"
  bnb_4bit_quant_type: "nf4"

lora:
  r: 16
  lora_alpha: 32
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
    - "gate_proj"
    - "up_proj"
    - "down_proj"

training:
  output_dir: "./output/qwen-integration"
  num_train_epochs: 3
  per_device_train_batch_size: 4
  per_device_eval_batch_size: 4
  gradient_accumulation_steps: 4
  learning_rate: 2e-4
  weight_decay: 0.01
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  logging_steps: 10
  save_steps: 500
  eval_steps: 500
  save_total_limit: 3
  fp16: true
  bf16: false
  gradient_checkpointing: true
  optim: "paged_adamw_32bit"
  max_grad_norm: 0.3

data:
  train_file: "./data/integration_train.json"
  eval_file: "./data/integration_eval.json"
  max_seq_length: 512
  train_size: 10000
  eval_size: 500